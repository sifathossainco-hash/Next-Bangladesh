<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Next Bangladesh</title>
</head>

<body>

<h2>📰 News Upload Panel</h2>

<input id="title" placeholder="News Title"><br><br>
<textarea id="desc" placeholder="News Description"></textarea><br><br>

<input type="file" id="image"><br><br>

<button onclick="uploadNews()">Upload News</button>

<p id="status"></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

<script>
// ✅ Firebase Config (FIXED)
const firebaseConfig = {
  apiKey: "AIzaSyBQ4qovAjb4m8VOOlttB9k7dwyST_uxRZ8",
  authDomain: "next-bangladesh-beca6.firebaseapp.com",
  projectId: "next-bangladesh-beca6",
  storageBucket: "next-bangladesh-beca6.appspot.com",
  messagingSenderId: "988250949328",
  appId: "1:988250949328:web:8e44f2a9e556d9d27200d5"
};

// Init Firebase
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// ✅ Upload Function (FIXED)
function uploadNews(){

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("image").files[0];

  if(!title || !desc || !file){
    document.getElementById("status").innerText = "⚠️ সব কিছু পূরণ করুন";
    return;
  }

  document.getElementById("status").innerText = "Uploading... ⏳";

  const ref = storage.ref("news/" + Date.now() + "_" + file.name);

  ref.put(file).then(() => {

    ref.getDownloadURL().then(url => {

      db.collection("news").add({
        title: title,
        desc: desc,
        image: url,
        time: Date.now()
      });

      document.getElementById("status").innerText = "✅ News Uploaded Successfully!";
      
      // clear inputs
      document.getElementById("title").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("image").value = "";

    });

  }).catch(err => {
    document.getElementById("status").innerText = "❌ Error: " + err.message;
  });

}
</script>

</body>
</html>
