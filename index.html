<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Bangladesh | আধুনিক সংবাদ মাধ্যম</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar py-2 d-none d-md-block">
    <div class="container d-flex justify-content-between align-items-center">

        <div id="current-date">বাংলাদেশ নিউজ পোর্টাল</div>

        <div class="top-social">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>

    </div>
</div>

<!-- HEADER -->
<header class="py-3 border-bottom bg-white">
    <div class="container">
        <div class="row align-items-center">

            <div class="col-md-4">
                <div class="logo-area">
                    <img src="./logo.png" class="site-logo">
                    <h1 class="site-title">NEXT BANGLADESH</h1>
                </div>
            </div>

            <div class="col-md-8 d-none d-md-block">
                <div class="ad-placeholder">বিজ্ঞাপন</div>
            </div>

        </div>
    </div>
</header>

<!-- NAVBAR (FIXED COLLAPSE ISSUE) -->
<nav class="navbar navbar-expand-lg navbar-dark main-nav sticky-top">
    <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">

            <ul class="navbar-nav me-auto">

                <li class="nav-item"><a class="nav-link" href="#">প্রচ্ছদ</a></li>
                <li class="nav-item"><a class="nav-link" href="#">জাতীয়</a></li>
                <li class="nav-item"><a class="nav-link" href="#">রাজনীতি</a></li>
                <li class="nav-item"><a class="nav-link" href="#">আন্তর্জাতিক</a></li>
                <li class="nav-item"><a class="nav-link" href="#">খেলাধুলা</a></li>
                <li class="nav-item"><a class="nav-link" href="#">বিনোদন</a></li>
                <li class="nav-item"><a class="nav-link" href="#">প্রযুক্তি</a></li>
                <li class="nav-item"><a class="nav-link" href="#">ইসলাম</a></li>

            </ul>

        </div>

    </div>
</nav>

<!-- HERO -->
<section class="hero-section mt-4">
    <div class="container">

        <div class="hero-card">
            <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c">

            <div class="hero-content">
                <h2>Next Bangladesh News Portal</h2>
                <p>Live News System Ready</p>
            </div>

        </div>

    </div>
</section>

<!-- NEWS SECTION -->
<section class="news-section mt-5">
    <div class="container">

        <h3 class="category-header">সর্বশেষ সংবাদ</h3>

        <!-- Firebase will inject news here -->
        <div class="row g-4" id="newsContainer"></div>

    </div>
</section>

<!-- FOOTER -->
<footer class="mt-5 py-5 text-white bg-dark">
    <div class="container text-center">

        <img src="./logo.png" style="height:60px;">
        <h3>NEXT BANGLADESH</h3>
        <p>বস্তুনিষ্ঠ সংবাদ এবং সত্যের পথে আমরা সবসময়।</p>

    </div>
</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>
